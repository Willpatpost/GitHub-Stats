
<svg xmlns="http://www.w3.org/2000/svg" style="isolation: isolate" viewBox="0 0 800 242" width="800px" height="242px" role="img" aria-labelledby="title desc">
  <title id="title">Willpatpost GitHub stats board</title>
  <desc id="desc">GitHub contribution totals, streaks, and top languages for Willpatpost.</desc>
  <style>
    @keyframes reveal {
      from { opacity: 0.2; }
      to { opacity: 1; }
    }
    .animate { animation: reveal 320ms ease-out both; }
    .background { fill: #ffffff; stroke: #d0d7de; }
    .username { font: 600 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2328; }
    .subtitle, .updated { font: 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #656d76; }
    .section-label, .metric-label { font: 600 10px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #656d76; }
    .metric-label, .section-label { text-transform: uppercase; }
    .metric-value { font: 600 31px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #7d4e00; }
    .metric-unit, .metric-note { fill: #656d76; }
    .metric-note { font: 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .language-name { font: 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2328; }
    .language-percent { font: 10px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #656d76; }
    .language-track { fill: #eaeef2; }
    .empty-state { font: 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #656d76; }
    .rule { stroke: #d8dee4; stroke-width: 1; }
    .accent { fill: #bf8700; }
    @media (prefers-color-scheme: dark) {
      .background { fill: #0d1117; stroke: #30363d; }
      .username, .language-name { fill: #f0f6fc; }
      .subtitle, .updated, .section-label, .metric-label, .metric-unit, .metric-note, .language-percent, .empty-state { fill: #8b949e; }
      .metric-value { fill: #f0c74e; }
      .language-track { fill: #21262d; }
      .rule { stroke: #21262d; }
      .accent { fill: #e3b341; }
    }
    @media (prefers-reduced-motion: reduce) {
      .animate { animation: none; }
    }
  </style>

  <rect class="background" x="0.5" y="0.5" width="799" height="241" rx="8" />
  <rect class="accent" x="24" y="22" width="4" height="24" rx="2" />
  <text class="username" x="38" y="31">Willpatpost</text>
  <text class="subtitle" x="38" y="46">GitHub activity overview</text>
  <text class="updated" x="776" y="34" text-anchor="end">Updated Jul 22, 2026, 5:19 PM ET</text>
  <line class="rule" x1="24" y1="62" x2="776" y2="62" />

  <g class="animate" style="animation-delay: 20ms">
    <text class="metric-label" x="24" y="85">Total contributions</text>
    <text class="metric-value" x="24" y="120">1,739</text>
    <text class="metric-note" x="24" y="141">Since Oct 3, 2023</text>
  </g>
  <g class="animate" style="animation-delay: 55ms">
    <text class="metric-label" x="286" y="85">Current streak</text>
    <text class="metric-value" x="286" y="120">1 <tspan class="metric-unit" font-size="15">day</tspan></text>
    <text class="metric-note" x="286" y="141">Jul 22 - Jul 22, 2026</text>
  </g>
  <g class="animate" style="animation-delay: 90ms">
    <text class="metric-label" x="548" y="85">Longest streak</text>
    <text class="metric-value" x="548" y="120">22 <tspan class="metric-unit" font-size="15">days</tspan></text>
    <text class="metric-note" x="548" y="141">Nov 27 - Dec 18, 2024</text>
  </g>

  <line class="rule" x1="24" y1="158" x2="776" y2="158" />
  <text class="section-label" x="24" y="181">Top languages</text>
  
    <g class="animate" style="animation-delay: 120ms">
      <circle cx="28" cy="198" r="4" fill="#f1e05a" />
      <text class="language-name" x="38" y="202">JavaScript</text>
      <text class="language-percent" x="188" y="202" text-anchor="end">64.6%</text>
      <rect class="language-track" x="24" y="212" width="164" height="7" rx="3.5" />
      <rect x="24" y="212" width="106" height="7" rx="3.5" fill="#f1e05a" />
    </g>
    <g class="animate" style="animation-delay: 155ms">
      <circle cx="216" cy="198" r="4" fill="#3572A5" />
      <text class="language-name" x="226" y="202">Python</text>
      <text class="language-percent" x="376" y="202" text-anchor="end">16.2%</text>
      <rect class="language-track" x="212" y="212" width="164" height="7" rx="3.5" />
      <rect x="212" y="212" width="27" height="7" rx="3.5" fill="#3572A5" />
    </g>
    <g class="animate" style="animation-delay: 190ms">
      <circle cx="404" cy="198" r="4" fill="#e34c26" />
      <text class="language-name" x="414" y="202">HTML</text>
      <text class="language-percent" x="564" y="202" text-anchor="end">11.1%</text>
      <rect class="language-track" x="400" y="212" width="164" height="7" rx="3.5" />
      <rect x="400" y="212" width="18" height="7" rx="3.5" fill="#e34c26" />
    </g>
    <g class="animate" style="animation-delay: 225ms">
      <circle cx="592" cy="198" r="4" fill="#663399" />
      <text class="language-name" x="602" y="202">CSS</text>
      <text class="language-percent" x="752" y="202" text-anchor="end">6.5%</text>
      <rect class="language-track" x="588" y="212" width="164" height="7" rx="3.5" />
      <rect x="588" y="212" width="11" height="7" rx="3.5" fill="#663399" />
    </g>
</svg>
