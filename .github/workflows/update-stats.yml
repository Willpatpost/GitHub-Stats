# .github/workflows/update-stats.yml
name: Update GitHub Stats

on:
  push:
    branches:
      - main
    paths-ignore:
      - stats_board.svg
  schedule:
    - cron: '*/15 * * * *'  # GitHub schedules this approximately every 15 minutes
  workflow_dispatch:        # Allows manual triggering

concurrency:
  group: update-github-stats
  cancel-in-progress: false

permissions:
  contents: write           # Grants write permissions to the repository

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run the stats generation script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: Willpatpost
        run: npm start

      - name: Configure Git Identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Stage and Add SVG
        run: |
          git add stats_board.svg
          git status

      - name: Commit and Push the Updated SVG
        run: |
          if git diff --cached --quiet; then
            echo "No changes detected in stats_board.svg. Skipping commit.";
          else
            git commit -m "Update stats board SVG with new data"
            git push origin main
          fi
